<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Disk Cleaner</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f13; --surface: #1a1a24; --border: #2a2a38;
  --accent: #6c63ff; --danger: #ff4f4f; --text: #e8e8f0; --muted: #7a7a9a;
  --safe: #4ecca3; --review: #ffc107; --risky: #ff4f4f;
}
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.75rem 1.5rem; display: flex; align-items: center; gap: 0.75rem; flex-shrink: 0; }
header h1 { font-size: 1.1rem; font-weight: 700; }

.controls { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.75rem 1.5rem; display: flex; gap: 0.75rem; align-items: center; flex-shrink: 0; flex-wrap: wrap; }
.controls input[type=text] { flex: 1; min-width: 200px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 0.5rem 0.85rem; font-size: 0.875rem; outline: none; }
.controls input:focus { border-color: var(--accent); }
.controls select { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 0.5rem 0.75rem; font-size: 0.875rem; outline: none; cursor: pointer; }
.btn { cursor: pointer; border: none; border-radius: 8px; font-size: 0.875rem; font-weight: 600; padding: 0.5rem 1.1rem; transition: opacity 0.15s; white-space: nowrap; }
.btn:hover { opacity: 0.85; } .btn:active { transform: scale(0.97); } .btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-safe    { background: var(--safe);   color: #0f0f13; }
.btn-danger  { background: var(--danger); color: #fff; }

.view-toggle { display: flex; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; flex-shrink: 0; }
.view-toggle button { cursor: pointer; background: transparent; border: none; color: var(--muted); font-size: 0.8rem; font-weight: 600; padding: 0.4rem 0.85rem; transition: all 0.15s; display: flex; align-items: center; gap: 5px; }
.view-toggle button.active { background: var(--accent); color: #fff; }
.view-toggle button:not(.active):hover { color: var(--text); }

.breadcrumb { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.5rem 1.5rem; display: flex; align-items: center; gap: 0.35rem; font-size: 0.8rem; color: var(--muted); flex-shrink: 0; min-height: 34px; }
.breadcrumb span { cursor: pointer; } .breadcrumb span:hover { color: var(--accent); }
.breadcrumb .sep { color: var(--border); cursor: default; }

.main { display: flex; flex: 1; overflow: hidden; }
.view { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.view.hidden { display: none; }

#treemap-container { flex: 1; position: relative; overflow: hidden; }
#treemap-container svg { width: 100%; height: 100%; display: block; }

/* ── list toolbar ── */
.list-toolbar {
  padding: 0.55rem 1rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 0.75rem;
  font-size: 0.8rem; color: var(--muted);
  flex-shrink: 0; flex-wrap: wrap;
}
.list-toolbar strong { color: var(--text); }
.filter-pills { display: flex; gap: 0.35rem; margin-left: auto; }
.pill {
  cursor: pointer; border: 1px solid var(--border); border-radius: 20px;
  padding: 0.2rem 0.65rem; font-size: 0.72rem; font-weight: 600;
  background: transparent; color: var(--muted); transition: all 0.15s;
}
.pill:hover { color: var(--text); border-color: var(--text); }
.pill.active-all    { background: var(--accent);  border-color: var(--accent);  color: #fff; }
.pill.active-safe   { background: var(--safe);    border-color: var(--safe);    color: #0f0f13; }
.pill.active-review { background: var(--review);  border-color: var(--review);  color: #0f0f13; }
.pill.active-danger { background: var(--risky);   border-color: var(--risky);   color: #fff; }

/* ── tree table ── */
.list-scroll { flex: 1; overflow-y: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
thead th {
  background: var(--bg); padding: 0.6rem 0.85rem; text-align: left;
  font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em;
  color: var(--muted); border-bottom: 1px solid var(--border);
  user-select: none; white-space: nowrap; position: sticky; top: 0; z-index: 1;
}
thead th.sortable { cursor: pointer; } thead th.sortable:hover { color: var(--text); }
thead th.sorted { color: var(--accent); }
tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(108,99,255,0.04); }
tbody tr.row-selected { background: rgba(108,99,255,0.1); }
tbody tr.dir-row { background: rgba(255,255,255,0.015); }
tbody tr.dir-row:hover { background: rgba(255,255,255,0.03); }
td { padding: 0.55rem 0.85rem; vertical-align: middle; white-space: nowrap; }

/* indent column */
.td-indent { display: flex; align-items: center; gap: 0; }
.indent-spacer { display: inline-block; width: 18px; flex-shrink: 0; }
.toggle-btn {
  background: none; border: none; cursor: pointer; color: var(--muted);
  font-size: 0.65rem; width: 16px; flex-shrink: 0; padding: 0;
  transition: transform 0.15s; display: flex; align-items: center;
}
.toggle-btn.open { transform: rotate(90deg); }
.dir-icon { font-size: 0.85rem; flex-shrink: 0; }
.file-icon { font-size: 0.75rem; flex-shrink: 0; opacity: 0.6; }

.td-name { max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
.dir-name { font-weight: 700; color: var(--text); }
.dir-meta { font-size: 0.7rem; color: var(--muted); margin-left: 6px; }
.td-path {
  font-family: 'SF Mono','Fira Code',monospace; font-size: 0.72rem;
  color: var(--muted); max-width: 260px; overflow: hidden; text-overflow: ellipsis;
}
.size-bar-wrap { background: var(--border); border-radius: 3px; height: 3px; width: 50px; margin-top: 3px; }
.size-bar { height: 100%; border-radius: 3px; background: var(--accent); }
.badge { display: inline-flex; align-items: center; gap: 4px; font-size: 0.7rem; font-weight: 600; padding: 0.2rem 0.5rem; border-radius: 20px; white-space: nowrap; }
.badge.safe   { background: rgba(78,204,163,0.15); color: var(--safe); }
.badge.review { background: rgba(255,193,7,0.15);  color: var(--review); }
.badge.danger { background: rgba(255,79,79,0.15);  color: var(--risky); }
.badge-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.safe .badge-dot { background: var(--safe); } .review .badge-dot { background: var(--review); } .danger .badge-dot { background: var(--risky); }
.td-actions { display: flex; gap: 0.35rem; align-items: center; }
.btn-sm { cursor: pointer; border-radius: 6px; font-size: 0.72rem; font-weight: 600; padding: 0.22rem 0.55rem; border: 1px solid; transition: all 0.15s; background: transparent; white-space: nowrap; }
.btn-sm.del    { border-color: var(--danger); color: var(--danger); } .btn-sm.del:hover { background: var(--danger); color: #fff; }
.btn-sm.finder { border-color: var(--border); color: var(--muted); } .btn-sm.finder:hover { border-color: var(--accent); color: var(--accent); }
.btn-sm.copy   { border-color: var(--border); color: var(--muted); } .btn-sm.copy:hover { border-color: var(--safe); color: var(--safe); }
input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; accent-color: var(--accent); }

/* ── sidebar ── */
.sidebar { width: 270px; flex-shrink: 0; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.legend { padding: 0.6rem 1rem; border-bottom: 1px solid var(--border); display: flex; gap: 0.75rem; font-size: 0.72rem; flex-wrap: wrap; }
.leg { display: flex; align-items: center; gap: 4px; }
.leg-dot { width: 8px; height: 8px; border-radius: 2px; }
.safe-cta { margin: 0.75rem; background: rgba(78,204,163,0.1); border: 1px solid rgba(78,204,163,0.3); border-radius: 10px; padding: 0.75rem; font-size: 0.8rem; display: none; }
.safe-cta p { color: var(--muted); margin-top: 2px; font-size: 0.72rem; }
.savings { font-size: 1.25rem; font-weight: 800; color: var(--safe); margin: 0.2rem 0; }
.sidebar-header { padding: 0.85rem 1rem; border-bottom: 1px solid var(--border); }
.sidebar-header h3 { font-size: 0.875rem; font-weight: 700; margin-bottom: 0.2rem; }
.sidebar-header p { font-size: 0.72rem; color: var(--muted); }
.selected-list { flex: 1; overflow-y: auto; padding: 0.4rem; }
.sel-item { display: flex; align-items: center; gap: 0.4rem; padding: 0.35rem 0.5rem; border-radius: 6px; font-size: 0.72rem; }
.sel-item:hover { background: rgba(255,255,255,0.04); }
.sel-item .sel-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sel-item .sel-size { color: var(--muted); flex-shrink: 0; }
.sel-item .sel-rm { cursor: pointer; color: var(--danger); background: none; border: none; padding: 0; font-size: 0.9rem; }
.sidebar-footer { padding: 0.85rem; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 0.5rem; }
.empty-sidebar { padding: 2rem 1rem; text-align: center; color: var(--muted); font-size: 0.78rem; }
.empty-sidebar .icon { font-size: 1.8rem; display: block; margin-bottom: 0.5rem; }

.spinner-overlay { position: fixed; inset: 0; background: rgba(15,15,19,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; font-size: 0.875rem; color: var(--muted); z-index: 100; }
.spinner-ring { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.tooltip { position: fixed; background: #1e1e2e; border: 1px solid var(--border); border-radius: 8px; padding: 0.6rem 0.85rem; font-size: 0.78rem; pointer-events: none; z-index: 999; max-width: 260px; opacity: 0; transition: opacity 0.1s; }
.tooltip.show { opacity: 1; }
.tooltip strong { display: block; margin-bottom: 3px; word-break: break-all; }
.tooltip .t-size { color: var(--safe); font-weight: 700; }
.tooltip .t-safe { color: var(--safe); } .tooltip .t-review { color: var(--review); } .tooltip .t-danger { color: var(--risky); }

.toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem 1rem; font-size: 0.82rem; opacity: 0; transform: translateY(8px); transition: all 0.25s; z-index: 9999; }
.toast.show { opacity: 1; transform: none; }
.toast.success { border-color: var(--safe); color: var(--safe); }
.toast.error   { border-color: var(--danger); color: var(--danger); }

.node rect { stroke: var(--bg); stroke-width: 1.5px; cursor: pointer; transition: opacity 0.15s; }
.node rect:hover { opacity: 0.8; }
.node rect.selected { stroke: #fff; stroke-width: 2.5px; }
.node text { pointer-events: none; font-family: -apple-system, sans-serif; fill: rgba(255,255,255,0.85); }
.node.dir > rect { cursor: zoom-in; }
</style>
</head>
<body>

<header>
  <span style="font-size:1.3rem">🗂️</span>
  <h1>Disk Cleaner</h1>
</header>

<div class="controls">
  <input type="text" id="scanPath" placeholder="/Users/you" />
  <select id="minMB">
    <option value="1">1 MB+</option>
    <option value="10" selected>10 MB+</option>
    <option value="50">50 MB+</option>
    <option value="100">100 MB+</option>
    <option value="250">250 MB+</option>
    <option value="500">500 MB+</option>
  </select>
  <select id="maxDepth">
    <option value="3">3 levels</option>
    <option value="5" selected>5 levels</option>
    <option value="8">8 levels</option>
    <option value="999">Unlimited</option>
  </select>
  <button class="btn btn-primary" id="scanBtn" onclick="startScan()">Scan</button>
  <div class="view-toggle" style="margin-left:auto">
    <button id="btnGraph" class="active" onclick="setView('graph')">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
      Graph
    </button>
    <button id="btnList" onclick="setView('list')">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="2" width="14" height="2" rx="1"/><rect x="1" y="7" width="14" height="2" rx="1"/><rect x="1" y="12" width="14" height="2" rx="1"/></svg>
      List
    </button>
  </div>
</div>

<div class="breadcrumb" id="breadcrumb"></div>

<div class="main">
  <!-- Graph view -->
  <div class="view" id="graph-view">
    <div id="treemap-container">
      <svg id="treemap"></svg>
    </div>
  </div>

  <!-- List view -->
  <div class="view hidden" id="list-view">
    <div class="list-toolbar" id="listToolbar">
      <span>Scan to see files</span>
      <div class="filter-pills" id="filterPills">
        <button class="pill active-all" onclick="setSafetyFilter('all')">All</button>
        <button class="pill" onclick="setSafetyFilter('safe')">✓ Safe</button>
        <button class="pill" onclick="setSafetyFilter('review')">? Review</button>
        <button class="pill" onclick="setSafetyFilter('danger')">✕ Risky</button>
      </div>
    </div>
    <div class="list-scroll">
      <table id="listTable">
        <thead>
          <tr>
            <th style="width:32px"><input type="checkbox" id="chkAll" onchange="toggleAllRows(this.checked)" /></th>
            <th class="sortable" onclick="sortList('name')">Name</th>
            <th class="sortable sorted" onclick="sortList('size')">Size ↓</th>
            <th>Safety</th>
            <th>Path</th>
            <th class="sortable" onclick="sortList('modified')">Modified</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="listBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Shared sidebar -->
  <div class="sidebar">
    <div class="legend">
      <div class="leg"><div class="leg-dot" style="background:var(--safe)"></div>Safe</div>
      <div class="leg"><div class="leg-dot" style="background:var(--review)"></div>Review</div>
      <div class="leg"><div class="leg-dot" style="background:var(--risky)"></div>Risky</div>
      <div class="leg"><div class="leg-dot" style="background:#2e2e44"></div>Folder</div>
    </div>
    <div class="safe-cta" id="safeCta">
      <div class="savings" id="safeSize">—</div>
      <p id="safeDesc"></p>
      <button class="btn btn-safe" style="width:100%;margin-top:0.6rem;font-size:0.8rem" onclick="deleteAllSafe()">Delete All Safe Files</button>
    </div>
    <div class="sidebar-header">
      <h3>Selected</h3>
      <div class="savings" id="selectedSize">—</div>
      <p id="selectedCount">No files selected</p>
    </div>
    <div class="selected-list" id="selectedList">
      <div class="empty-sidebar"><span class="icon">☝️</span>Select files to delete</div>
    </div>
    <div class="sidebar-footer">
      <button class="btn btn-danger" id="deleteBtn" onclick="deleteSelected()" disabled>Delete Selected</button>
      <button class="btn" style="background:var(--border);color:var(--text)" onclick="clearSelection()">Clear</button>
    </div>
  </div>
</div>

<div class="spinner-overlay" id="spinner" style="display:none">
  <div class="spinner-ring"></div>Scanning…
</div>
<div class="tooltip" id="tooltip"></div>
<div class="toast"   id="toast"></div>

<script>
const COLOR = { safe: '#4ecca3', review: '#ffc107', danger: '#ff4f4f', dir: '#2e2e44' };
const SAFETY_LABEL = { safe: '✓ Safe to delete', review: '? Review before deleting', danger: '✕ Risky — do not delete' };

let fullTree = null, currentNode = null, navStack = [];
let selected  = new Map();
let currentView = 'graph';
let flatFiles = [], maxFileBytes = 1;
let sortCol = 'size', sortAsc = false;
let safetyFilter = 'all';
let collapsed = new Set(); // dir paths that are collapsed

// ── init ──────────────────────────────────────────────────────────────────────
async function init() {
  try { const r = await fetch('/api/home'); const { home } = await r.json(); document.getElementById('scanPath').value = home; } catch {}
}

// ── view toggle ───────────────────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  document.getElementById('graph-view').classList.toggle('hidden', v !== 'graph');
  document.getElementById('list-view').classList.toggle('hidden', v !== 'list');
  document.getElementById('breadcrumb').style.display = v === 'graph' ? 'flex' : 'none';
  document.getElementById('btnGraph').classList.toggle('active', v === 'graph');
  document.getElementById('btnList').classList.toggle('active', v === 'list');
  if (v === 'list' && fullTree) renderList();
  if (v === 'graph' && currentNode) renderTreemap(currentNode);
}

// ── scan ──────────────────────────────────────────────────────────────────────
async function startScan() {
  const scanPath = document.getElementById('scanPath').value.trim();
  if (!scanPath) { showToast('Enter a folder path', 'error'); return; }
  const minMB = document.getElementById('minMB').value;
  const maxDepth = document.getElementById('maxDepth').value;
  document.getElementById('spinner').style.display = 'flex';
  document.getElementById('scanBtn').disabled = true;
  selected.clear(); navStack = []; collapsed.clear(); updateSidebar();
  try {
    const r = await fetch(`/api/tree?path=${encodeURIComponent(scanPath)}&minMB=${minMB}&maxDepth=${maxDepth}`);
    const data = await r.json();
    if (data.error) { showToast(data.error, 'error'); return; }
    fullTree = data; currentNode = fullTree; navStack = [fullTree];
    flatFiles = flattenTree(fullTree);
    maxFileBytes = flatFiles.reduce((m,f) => Math.max(m,f.size), 1);
    updateSafeCta();
    if (currentView === 'graph') renderTreemap(currentNode); else renderList();
  } catch (e) { showToast('Scan failed: ' + e.message, 'error'); }
  finally { document.getElementById('spinner').style.display = 'none'; document.getElementById('scanBtn').disabled = false; }
}

function flattenTree(node) {
  const acc = [];
  function walk(n) { if (n.type === 'file') acc.push(n); (n.children || []).forEach(walk); }
  walk(node); return acc;
}

// ── safety filter ─────────────────────────────────────────────────────────────
function setSafetyFilter(level) {
  safetyFilter = level;
  // update pill active classes
  document.querySelectorAll('.pill').forEach(p => {
    p.className = 'pill';
    if (p.textContent.trim().includes('Safe') && level === 'safe') p.classList.add('active-safe');
    else if (p.textContent.trim().includes('Review') && level === 'review') p.classList.add('active-review');
    else if (p.textContent.trim().includes('Risky') && level === 'danger') p.classList.add('active-danger');
    else if (p.textContent.trim() === 'All' && level === 'all') p.classList.add('active-all');
  });
  if (fullTree) renderList();
}

function filePassesFilter(f) {
  if (safetyFilter === 'all') return true;
  return f.safety?.level === safetyFilter;
}

// ── nested list view ──────────────────────────────────────────────────────────
function sortList(col) {
  if (sortCol === col) sortAsc = !sortAsc; else { sortCol = col; sortAsc = col === 'name'; }
  renderList();
}

// Walk tree, emit rows: { type:'dir'|'file', depth, data }
function buildRows(node, depth, filter) {
  const rows = [];
  if (!node.children?.length) return rows;

  // Separate dirs and files in this node
  const dirs  = node.children.filter(c => c.type === 'dir');
  const files = node.children.filter(c => c.type === 'file' && (filter === 'all' || c.safety?.level === filter));

  // Sort files
  const sortedFiles = [...files].sort((a, b) => {
    let av, bv;
    if (sortCol === 'size')     { av = a.size; bv = b.size; }
    else if (sortCol === 'name'){ av = a.name.toLowerCase(); bv = b.name.toLowerCase(); }
    else if (sortCol === 'modified'){ av = a.modified; bv = b.modified; }
    if (av < bv) return sortAsc ? -1 : 1;
    if (av > bv) return sortAsc ? 1 : -1;
    return 0;
  });

  // Add file rows for this level
  sortedFiles.forEach(f => rows.push({ type: 'file', depth, data: f }));

  // Recurse into subdirs that have matching content
  dirs.forEach(dir => {
    const childRows = buildRows(dir, depth + 1, filter);
    if (childRows.length === 0) return; // skip empty dirs
    // compute visible size (files matching filter)
    const visSize = childRows.filter(r => r.type === 'file').reduce((s,r) => s + r.data.size, 0);
    const visCount = childRows.filter(r => r.type === 'file').length;
    rows.push({ type: 'dir', depth, data: dir, childRows, visSize, visCount });
  });

  return rows;
}

function renderList() {
  if (!fullTree) return;

  const visFiles = flatFiles.filter(filePassesFilter);
  const total = visFiles.reduce((s,f) => s + f.size, 0);
  document.getElementById('listToolbar').innerHTML = `
    <span>Showing <strong>${visFiles.length}</strong> files · <strong>${fmtBytes(total)}</strong></span>
    <div class="filter-pills" id="filterPills">
      <button class="pill ${safetyFilter==='all'?'active-all':''}" onclick="setSafetyFilter('all')">All</button>
      <button class="pill ${safetyFilter==='safe'?'active-safe':''}" onclick="setSafetyFilter('safe')">✓ Safe</button>
      <button class="pill ${safetyFilter==='review'?'active-review':''}" onclick="setSafetyFilter('review')">? Review</button>
      <button class="pill ${safetyFilter==='danger'?'active-danger':''}" onclick="setSafetyFilter('danger')">✕ Risky</button>
    </div>`;

  const rows = buildRows(fullTree, 0, safetyFilter);
  const tbody = document.getElementById('listBody');
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:3rem;color:var(--muted)">No files match this filter</td></tr>`;
    return;
  }
  tbody.innerHTML = renderRows(rows);
}

function renderRows(rows) {
  return rows.map(row => {
    if (row.type === 'dir') return renderDirRow(row);
    return renderFileRow(row);
  }).join('');
}

function renderDirRow(row) {
  const { depth, data, childRows, visSize, visCount } = row;
  const isCollapsed = collapsed.has(data.path);
  const indent = '&#8203;'.repeat(0) + `<span class="indent-spacer" style="width:${depth*18}px"></span>`;
  const chevron = `<button class="toggle-btn ${isCollapsed?'':'open'}" onclick="toggleDir('${esc(data.path)}')" title="${isCollapsed?'Expand':'Collapse'}">▶</button>`;
  const childHtml = isCollapsed ? '' : renderRows(childRows);
  return `
    <tr class="dir-row" data-dir="${esc(data.path)}">
      <td><input type="checkbox" onchange="toggleDirSelect('${esc(data.path)}',this.checked)" ${isDirFullySelected(data.path,childRows)?'checked':''}  /></td>
      <td colspan="5">
        <div class="td-indent">
          ${indent}${chevron}
          <span class="dir-icon">📁</span>
          <span class="dir-name" style="margin-left:6px">${esc(data.name)}</span>
          <span class="dir-meta">${visCount} file${visCount!==1?'s':''} · ${fmtBytes(visSize)}</span>
        </div>
      </td>
      <td></td>
    </tr>
    ${childHtml}`;
}

function renderFileRow(row) {
  const { depth, data: f } = row;
  const s = f.safety || { level: 'review', reason: 'Unknown' };
  const chk = selected.has(f.path) ? 'checked' : '';
  const pct = Math.round((f.size / maxFileBytes) * 100);
  const indent = `<span class="indent-spacer" style="width:${depth*18+16}px"></span>`;
  return `
    <tr class="${selected.has(f.path)?'row-selected':''}" data-path="${esc(f.path)}">
      <td><input type="checkbox" ${chk} onchange="listToggle('${esc(f.path)}',this.checked)" /></td>
      <td class="td-name">
        <div class="td-indent">${indent}<span class="file-icon">📄</span><span style="margin-left:5px" title="${esc(f.path)}">${esc(f.name)}</span></div>
      </td>
      <td>
        <span style="font-weight:700">${fmtBytes(f.size)}</span>
        <div class="size-bar-wrap"><div class="size-bar" style="width:${pct}%"></div></div>
      </td>
      <td><span class="badge ${s.level}" title="${esc(s.reason)}"><span class="badge-dot"></span>${s.level==='danger'?'Risky':s.level==='safe'?'Safe':'Review'}</span></td>
      <td class="td-path" title="${esc(f.path)}">${esc(f.path)}</td>
      <td>${f.modified ? new Date(f.modified).toLocaleDateString() : '—'}</td>
      <td class="td-actions">
        <button class="btn-sm copy"   title="Copy path"      onclick="copyPath('${esc(f.path)}')">⎘</button>
        <button class="btn-sm finder" title="Show in Finder" onclick="revealInFinder('${esc(f.path)}')">🔍</button>
        <button class="btn-sm del"    onclick="deleteSingle('${esc(f.path)}')">Delete</button>
      </td>
    </tr>`;
}

// ── dir toggle (collapse / expand) ───────────────────────────────────────────
function toggleDir(dirPath) {
  if (collapsed.has(dirPath)) collapsed.delete(dirPath); else collapsed.add(dirPath);
  renderList();
}

function isDirFullySelected(dirPath, childRows) {
  const fileRows = childRows.filter(r => r.type === 'file');
  return fileRows.length > 0 && fileRows.every(r => selected.has(r.data.path));
}

function toggleDirSelect(dirPath, checked) {
  // select/deselect all visible files under this dir
  function walk(rows) {
    rows.forEach(r => {
      if (r.type === 'file') { if (checked) selected.set(r.data.path, r.data); else selected.delete(r.data.path); }
      else if (r.type === 'dir') walk(r.childRows);
    });
  }
  const rows = buildRows(fullTree, 0, safetyFilter);
  const dirRow = rows.find(r => r.type === 'dir' && r.data.path === dirPath);
  if (dirRow) walk(dirRow.childRows);
  updateSidebar(); renderList();
}

// ── list row toggle ───────────────────────────────────────────────────────────
function listToggle(p, checked) {
  const f = flatFiles.find(x => x.path === p);
  if (!f) return;
  if (checked) selected.set(p, f); else selected.delete(p);
  updateSidebar();
  const row = document.querySelector(`tr[data-path="${esc(p)}"]`);
  if (row) row.classList.toggle('row-selected', checked);
}

function toggleAllRows(checked) {
  flatFiles.filter(filePassesFilter).forEach(f => { if (checked) selected.set(f.path, f); else selected.delete(f.path); });
  updateSidebar(); renderList();
}

// ── copy path ─────────────────────────────────────────────────────────────────
function copyPath(p) {
  navigator.clipboard.writeText(p).then(() => showToast('Path copied!', 'success')).catch(() => {
    // fallback for non-secure contexts
    const ta = document.createElement('textarea');
    ta.value = p; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('Path copied!', 'success');
  });
}

// ── graph view ────────────────────────────────────────────────────────────────
function renderTreemap(node) {
  currentNode = node; updateBreadcrumb();
  const c = document.getElementById('treemap-container');
  const W = c.clientWidth, H = c.clientHeight;
  const svg = d3.select('#treemap'); svg.selectAll('*').remove(); svg.attr('viewBox',`0 0 ${W} ${H}`);
  if (!node.children?.length) { svg.append('text').attr('x',W/2).attr('y',H/2).attr('text-anchor','middle').attr('fill','var(--muted)').text('No large files here'); return; }
  const root = d3.hierarchy(node).sum(d=>d.type==='file'?d.size:0).sort((a,b)=>b.value-a.value);
  d3.treemap().size([W,H]).paddingInner(3).paddingTop(22).paddingOuter(4)(root);
  const cell = svg.selectAll('g.node').data(root.descendants().filter(d=>d.depth>0))
    .enter().append('g').attr('class',d=>'node '+d.data.type).attr('transform',d=>`translate(${d.x0},${d.y0})`);
  cell.append('rect')
    .attr('width',d=>Math.max(0,d.x1-d.x0)).attr('height',d=>Math.max(0,d.y1-d.y0))
    .attr('fill',d=>d.data.type==='dir'?COLOR.dir:(COLOR[d.data.safety?.level]||COLOR.review)).attr('rx',3)
    .classed('selected',d=>d.data.type==='file'&&selected.has(d.data.path))
    .on('click',(evt,d)=>{evt.stopPropagation();if(d.data.type==='dir'){navStack=navStack.slice(0,navStack.indexOf(currentNode)+1);navStack.push(d.data);renderTreemap(d.data);}else{toggleSelect(d.data);d3.select(evt.currentTarget).classed('selected',selected.has(d.data.path));}})
    .on('mousemove',(evt,d)=>showTip(evt,d.data)).on('mouseleave',hideTip);
  cell.filter(d=>(d.x1-d.x0)>50&&(d.y1-d.y0)>20).append('text').attr('x',5)
    .attr('y',d=>d.data.type==='dir'?14:(d.y1-d.y0)/2+4).attr('font-size',d=>Math.min(12,Math.max(9,(d.x1-d.x0)/8))).attr('font-weight',d=>d.data.type==='dir'?'700':'400')
    .text(d=>{const w=d.x1-d.x0,n=d.data.name,mc=Math.floor(w/7);return n.length>mc?n.slice(0,mc-1)+'…':n;});
  cell.filter(d=>d.data.type==='file'&&(d.x1-d.x0)>60&&(d.y1-d.y0)>34).append('text')
    .attr('x',5).attr('y',d=>(d.y1-d.y0)/2+16).attr('font-size',9).attr('fill','rgba(255,255,255,0.55)').text(d=>fmtBytes(d.data.size));
}

function updateBreadcrumb() {
  const bc=document.getElementById('breadcrumb'); bc.innerHTML='';
  const stack=navStack.slice(0,navStack.indexOf(currentNode)+1);
  stack.forEach((n,i)=>{
    if(i>0){const sep=document.createElement('span');sep.className='sep';sep.textContent=' / ';bc.appendChild(sep);}
    const s=document.createElement('span');s.textContent=n.name||n.path;
    if(i<stack.length-1){s.onclick=()=>{navStack=navStack.slice(0,i+1);renderTreemap(n);};}else{s.style.color='var(--text)';s.style.fontWeight='600';}
    bc.appendChild(s);
  });
}

// ── selection ─────────────────────────────────────────────────────────────────
function toggleSelect(data) { if(selected.has(data.path))selected.delete(data.path);else selected.set(data.path,data);updateSidebar(); }

function clearSelection() {
  selected.clear(); updateSidebar();
  d3.selectAll('.node rect').classed('selected',false);
  document.querySelectorAll('tbody tr.row-selected').forEach(r=>r.classList.remove('row-selected'));
  document.querySelectorAll('tbody input[type=checkbox]').forEach(c=>c.checked=false);
}

function updateSidebar() {
  const list=document.getElementById('selectedList'),countEl=document.getElementById('selectedCount'),sizeEl=document.getElementById('selectedSize'),btn=document.getElementById('deleteBtn');
  if(!selected.size){list.innerHTML='<div class="empty-sidebar"><span class="icon">☝️</span>Select files to delete</div>';countEl.textContent='No files selected';sizeEl.textContent='—';btn.disabled=true;return;}
  const total=[...selected.values()].reduce((s,f)=>s+f.size,0);
  countEl.textContent=`${selected.size} file${selected.size>1?'s':''} selected`;sizeEl.textContent=fmtBytes(total);btn.disabled=false;
  list.innerHTML=[...selected.values()].map(f=>`<div class="sel-item"><span class="sel-name" title="${esc(f.path)}">${esc(f.name)}</span><span class="sel-size">${fmtBytes(f.size)}</span><button class="sel-rm" onclick="removeFromSelection('${esc(f.path)}')">×</button></div>`).join('');
}

function removeFromSelection(p) {
  selected.delete(p);
  d3.selectAll('.node rect').classed('selected',d=>d.data&&selected.has(d.data.path));
  const row=document.querySelector(`tr[data-path="${esc(p)}"]`);
  if(row){row.classList.remove('row-selected');const chk=row.querySelector('input');if(chk)chk.checked=false;}
  updateSidebar();
}

// ── safe CTA ──────────────────────────────────────────────────────────────────
function collectSafeFiles(node){const acc=[];function walk(n){if(n.type==='file'&&n.safety?.level==='safe')acc.push(n);(n.children||[]).forEach(walk);}walk(node);return acc;}
function updateSafeCta(){
  if(!fullTree)return;const safe=collectSafeFiles(fullTree);const cta=document.getElementById('safeCta');
  if(!safe.length){cta.style.display='none';return;}
  const total=safe.reduce((s,f)=>s+f.size,0);
  document.getElementById('safeSize').textContent=fmtBytes(total);
  document.getElementById('safeDesc').textContent=`${safe.length} safe file${safe.length>1?'s':''} ready to clean`;cta.style.display='block';
}
async function deleteAllSafe(){
  if(!fullTree)return;const safe=collectSafeFiles(fullTree);if(!safe.length)return;
  const total=safe.reduce((s,f)=>s+f.size,0);
  if(!confirm(`Delete ${safe.length} safe file(s) and free ${fmtBytes(total)}?\nIncludes: caches, logs, temp files, downloads.\nThis cannot be undone.`))return;
  await doDelete(safe.map(f=>f.path));updateSafeCta();
}

// ── delete ────────────────────────────────────────────────────────────────────
async function deleteSelected(){
  if(!selected.size)return;const paths=[...selected.keys()];
  if(!confirm(`Delete ${paths.length} file(s) and free ${fmtBytes([...selected.values()].reduce((s,f)=>s+f.size,0))}?\nThis cannot be undone.`))return;
  await doDelete(paths);clearSelection();updateSafeCta();
}
async function deleteSingle(p){
  const f=flatFiles.find(x=>x.path===p);
  if(!confirm(`Delete?\n\n${p}\n${f?fmtBytes(f.size):''}`))return;
  await doDelete([p]);updateSafeCta();
}
async function doDelete(paths){
  let deleted=0;
  for(const fp of paths){try{const r=await fetch('/api/delete',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({filePath:fp})});const d=await r.json();if(d.success){deleted++;pruneFromTree(fullTree,fp);selected.delete(fp);}}catch{}}
  flatFiles=flattenTree(fullTree);maxFileBytes=flatFiles.reduce((m,f)=>Math.max(m,f.size),1);
  showToast(`Deleted ${deleted} file${deleted>1?'s':''}`, 'success');
  if(currentView==='graph')renderTreemap(currentNode);else renderList();updateSidebar();
}
function pruneFromTree(node,fp){
  if(!node.children)return;const idx=node.children.findIndex(c=>c.path===fp);
  if(idx!==-1){node.size-=node.children[idx].size;node.children.splice(idx,1);return;}
  for(const child of node.children){if(fp.startsWith(child.path+'/')){const b=child.size;pruneFromTree(child,fp);node.size-=(b-child.size);}}
}

async function revealInFinder(fp){try{await fetch('/api/reveal',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({filePath:fp})});}catch{}}

// ── tooltip / toast / utils ───────────────────────────────────────────────────
function showTip(evt,data){
  const t=document.getElementById('tooltip'),s=data.safety;
  t.innerHTML=`<strong>${esc(data.name)}</strong><span class="t-size">${fmtBytes(data.size)}</span>${s?`<div class="t-${s.level}">${SAFETY_LABEL[s.level]}</div><div style="color:var(--muted);font-size:0.7rem">${esc(s.reason)}</div>`:'<div style="color:var(--muted)">Folder — click to drill in</div>'}${data.modified?`<div style="color:var(--muted);margin-top:3px">${new Date(data.modified).toLocaleDateString()}</div>`:''}`;
  t.style.left=(evt.clientX+14)+'px';t.style.top=(evt.clientY-10)+'px';t.classList.add('show');
}
function hideTip(){document.getElementById('tooltip').classList.remove('show');}
function fmtBytes(b){const u=['B','KB','MB','GB','TB'];let i=0,s=b;while(s>=1024&&i<u.length-1){s/=1024;i++;}return `${s.toFixed(i>0?1:0)} ${u[i]}`;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;setTimeout(()=>t.classList.remove('show'),3000);}

window.addEventListener('resize',()=>{if(currentView==='graph'&&currentNode)renderTreemap(currentNode);});
document.getElementById('breadcrumb').style.display='flex';
init();
</script>
